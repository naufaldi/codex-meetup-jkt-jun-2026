<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#122396" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D3DCF2" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#A5C5F5" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#101D79" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: "Plus Jakarta Sans", Arial, sans-serif; font-weight: 800; fill: #F7F9FF; font-size: 32px; letter-spacing: 0; }
      .core { font-family: "Plus Jakarta Sans", Arial, sans-serif; font-weight: 800; fill: #FFFFFF; font-size: 38px; }
      .body { font-family: "IBM Plex Sans", Arial, sans-serif; fill: #D7DEF8; font-size: 22px; }
      .mono { font-family: "JetBrains Mono", monospace; fill: #E9EBFF; font-size: 17px; font-weight: 700; letter-spacing: .02em; }
      .line { stroke: #A5C5F5; stroke-opacity: .78; stroke-width: 5; stroke-linecap: round; filter: url(#glow); }
    </style>
  </defs>

  <rect x="18" y="18" width="1164" height="744" fill="url(#panel)" stroke="#F7F9FF" stroke-opacity="0.24"/>
  <rect x="54" y="54" width="1092" height="672" stroke="#F7F9FF" stroke-opacity="0.22" stroke-dasharray="4 6"/>
  <circle cx="600" cy="355" r="250" fill="#D3DCF2" fill-opacity="0.13" filter="url(#glow)"/>

  <path d="M300 192 C390 230, 450 270, 507 314" class="line"/>
  <path d="M703 305 C780 230, 825 188, 898 166" class="line"/>
  <path d="M725 355 C810 345, 870 330, 920 318" class="line"/>
  <path d="M710 412 C795 480, 835 514, 908 560" class="line"/>
  <path d="M500 455 C430 520, 365 560, 290 590" class="line"/>

  <g filter="url(#softShadow)">
    <rect x="96" y="122" width="230" height="126" fill="url(#card)" stroke="#A5C5F5" stroke-opacity=".42"/>
    <text x="124" y="176" class="label">PRD</text>
    <text x="124" y="214" class="body">Product intent</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="478" y="280" width="250" height="170" fill="url(#card)" stroke="#A5C5F5" stroke-opacity=".72"/>
    <text x="548" y="348" class="core">Codex</text>
    <text x="530" y="390" class="body">Repo-aware</text>
    <text x="552" y="420" class="body">planning</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="868" y="96" width="270" height="132" fill="url(#card)" stroke="#A5C5F5" stroke-opacity=".42"/>
    <text x="894" y="148" class="label">Affected files</text>
    <text x="894" y="188" class="body">Where code changes</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="868" y="270" width="270" height="132" fill="url(#card)" stroke="#A5C5F5" stroke-opacity=".42"/>
    <text x="894" y="321" class="label">Impacted</text>
    <text x="894" y="357" class="label">features</text>
    <text x="894" y="390" class="body">What else moves</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="868" y="504" width="270" height="132" fill="url(#card)" stroke="#A5C5F5" stroke-opacity=".42"/>
    <text x="894" y="557" class="label">RFC draft</text>
    <text x="894" y="596" class="body">GitLab Wiki material</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="132" y="514" width="300" height="132" fill="url(#card)" stroke="#A5C5F5" stroke-opacity=".42"/>
    <text x="160" y="566" class="label">Pros / cons</text>
    <text x="160" y="606" class="body">Tradeoffs for review</text>
  </g>

  <g>
    <rect x="78" y="684" width="160" height="38" fill="#A5C5F5" fill-opacity=".12" stroke="#A5C5F5" stroke-opacity=".38"/>
    <text x="96" y="709" class="mono">Open questions</text>
    <rect x="252" y="684" width="196" height="38" fill="#A5C5F5" fill-opacity=".12" stroke="#A5C5F5" stroke-opacity=".38"/>
    <text x="270" y="709" class="mono">Acceptance criteria</text>
    <rect x="462" y="684" width="178" height="38" fill="#A5C5F5" fill-opacity=".12" stroke="#A5C5F5" stroke-opacity=".38"/>
    <text x="480" y="709" class="mono">Initiative ideas</text>
    <rect x="654" y="684" width="128" height="38" fill="#A5C5F5" fill-opacity=".12" stroke="#A5C5F5" stroke-opacity=".38"/>
    <text x="672" y="709" class="mono">Risk notes</text>
  </g>
</svg>
