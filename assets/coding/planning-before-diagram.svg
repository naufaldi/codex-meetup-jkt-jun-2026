<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#122396" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.23"/>
      <stop offset="1" stop-color="#A5C5F5" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#101D79" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: "Plus Jakarta Sans", Arial, sans-serif; font-weight: 800; fill: #F7F9FF; font-size: 34px; letter-spacing: 0; }
      .body { font-family: "IBM Plex Sans", Arial, sans-serif; fill: #D7DEF8; font-size: 22px; line-height: 1.3; }
      .mono { font-family: "JetBrains Mono", monospace; fill: #E9EBFF; font-size: 17px; font-weight: 700; letter-spacing: .02em; }
      .small { font-family: "IBM Plex Sans", Arial, sans-serif; fill: #EEF3FF; font-size: 20px; }
      .dash { stroke: #E4E3F3; stroke-opacity: .58; stroke-width: 4; stroke-dasharray: 10 12; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="18" y="18" width="1164" height="744" rx="0" fill="url(#panel)" stroke="#F7F9FF" stroke-opacity="0.24"/>
  <rect x="54" y="54" width="1092" height="672" rx="0" stroke="#F7F9FF" stroke-opacity="0.22" stroke-dasharray="4 6"/>
  <circle cx="890" cy="175" r="190" fill="#D3DCF2" fill-opacity="0.10" filter="url(#glow)"/>
  <circle cx="385" cy="505" r="220" fill="#8B72F5" fill-opacity="0.10" filter="url(#glow)"/>

  <path d="M300 197 C420 142, 507 140, 620 184" class="dash"/>
  <path d="M715 230 C790 255, 855 285, 925 350" class="dash"/>
  <path d="M356 280 C364 354, 353 412, 325 483" class="dash"/>
  <path d="M470 552 C590 555, 685 608, 790 600" class="dash"/>

  <g filter="url(#softShadow)">
    <rect x="112" y="112" width="250" height="138" fill="url(#card)" stroke="#F7F9FF" stroke-opacity="0.36"/>
    <text x="138" y="161" class="label">Meeting</text>
    <text x="138" y="199" class="body">Decision and user</text>
    <text x="138" y="228" class="body">problem</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="570" y="112" width="310" height="150" fill="url(#card)" stroke="#F7F9FF" stroke-opacity="0.36"/>
    <text x="598" y="164" class="label">Notion notes</text>
    <text x="598" y="204" class="body">Raw discussion context</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="865" y="330" width="270" height="140" fill="url(#card)" stroke="#F7F9FF" stroke-opacity="0.36"/>
    <text x="892" y="383" class="label">GitLab Wiki</text>
    <text x="892" y="423" class="body">PRD / RFC draft</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="170" y="470" width="330" height="146" fill="url(#card)" stroke="#F7F9FF" stroke-opacity="0.36"/>
    <text x="198" y="523" class="label">Old features</text>
    <text x="198" y="563" class="body">Existing behavior lives</text>
    <text x="198" y="592" class="body">elsewhere</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="728" y="552" width="330" height="140" fill="url(#card)" stroke="#F7F9FF" stroke-opacity="0.36"/>
    <text x="756" y="606" class="label">Unknown impact</text>
    <text x="756" y="646" class="body">Flows, APIs, permissions</text>
  </g>

  <g opacity=".95">
    <rect x="78" y="680" width="116" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="96" y="705" class="mono">Meeting</text>
    <rect x="208" y="680" width="106" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="229" y="705" class="mono">Notion</text>
    <rect x="328" y="680" width="146" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="348" y="705" class="mono">GitLab Wiki</text>
    <rect x="488" y="680" width="148" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="506" y="705" class="mono">Code memory</text>
    <rect x="650" y="680" width="154" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="668" y="705" class="mono">Hidden impact</text>
  </g>
</svg>
