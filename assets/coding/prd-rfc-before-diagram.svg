<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="780">
      <stop stop-color="#F7F9FF" stop-opacity=".18"/>
      <stop offset="1" stop-color="#122396" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity=".21"/>
      <stop offset="1" stop-color="#A5C5F5" stop-opacity=".08"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#101D79" flood-opacity=".32"/>
    </filter>
    <style>
      .label { font-family: "Plus Jakarta Sans", Arial, sans-serif; font-weight: 800; fill: #F7F9FF; font-size: 34px; }
      .body { font-family: "IBM Plex Sans", Arial, sans-serif; fill: #D7DEF8; font-size: 22px; }
      .mono { font-family: "JetBrains Mono", monospace; fill: #E9EBFF; font-size: 17px; font-weight: 700; }
      .dash { stroke: #E4E3F3; stroke-opacity: .55; stroke-width: 4; stroke-dasharray: 12 12; stroke-linecap: round; }
    </style>
  </defs>
  <rect x="18" y="18" width="1164" height="744" fill="url(#panel)" stroke="#F7F9FF" stroke-opacity=".24"/>
  <rect x="54" y="54" width="1092" height="672" stroke="#F7F9FF" stroke-opacity=".22" stroke-dasharray="4 6"/>

  <path d="M360 194 L458 284" class="dash"/>
  <path d="M534 394 L620 476" class="dash"/>
  <path d="M700 584 L782 640" class="dash"/>

  <g filter="url(#shadow)">
    <rect x="188" y="98" width="300" height="124" fill="url(#card)" stroke="#F7F9FF" stroke-opacity=".36"/>
    <text x="216" y="151" class="label">Read PRD</text>
    <text x="216" y="190" class="body">Understand product intent</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="390" y="270" width="340" height="126" fill="url(#card)" stroke="#F7F9FF" stroke-opacity=".36"/>
    <text x="418" y="323" class="label">Search patterns</text>
    <text x="418" y="362" class="body">Find old implementations</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="590" y="470" width="300" height="126" fill="url(#card)" stroke="#F7F9FF" stroke-opacity=".36"/>
    <text x="618" y="523" class="label">Blank RFC</text>
    <text x="618" y="562" class="body">Write from scratch</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="790" y="618" width="320" height="96" fill="url(#card)" stroke="#F7F9FF" stroke-opacity=".36"/>
    <text x="818" y="658" class="label">Missed edge cases</text>
    <text x="818" y="696" class="body">API, UI, data, rollout</text>
  </g>

  <g>
    <rect x="78" y="684" width="150" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="96" y="709" class="mono">Manual reading</text>
    <rect x="242" y="684" width="142" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="260" y="709" class="mono">Manual search</text>
    <rect x="398" y="684" width="132" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="416" y="709" class="mono">Unclear risks</text>
    <rect x="544" y="684" width="130" height="38" fill="#FFFFFF" fill-opacity=".10" stroke="#F7F9FF" stroke-opacity=".24"/>
    <text x="562" y="709" class="mono">Slow proposal</text>
  </g>
</svg>
